<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute-Based Retrieval | MetaSearch</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- ==============================================================
    SIDEBAR (Unified Navigation)
    ============================================================== -->
    <aside class="sidebar">
        <h2>MetaSearch</h2>
        <ul>
            <li><a href="../index.php">Home</a></li>
            <li><a href="abr_search.html" class="active">ABR</a></li>
            <li><a href="../TBR/tbr.php">TBR</a></li>
            <li><a href="../CBR/cbr_search.php">CBR</a></li>
        </ul>
    </aside>

    <!-- ==============================================================
    MAIN CONTENT
    ============================================================== -->
    <main class="main-content fade-in">
        <div class="container">
            <div class="header">
                <h1>Attribute-Based Retrieval (ABR)</h1>
                <div class="subtitle">Search students by group, name, and media availability</div>
            </div>

            <div class="panel">
                <form id="abrForm" class="filter-form" method="POST" action="abr_filter.php">
                    <!-- Group Filter -->
                    <div class="form-group">
                        <label for="group">Group</label>
                        <select id="group" name="group">
                            <option value="">All Groups</option>
                            <option value="GS01">GS01</option>
                            <option value="GS02">GS02</option>
                            <option value="GS03">GS03</option>
                            <option value="GS04">GS04</option>
                            <option value="GS05">GS05</option>
                            <option value="GW07">GW07</option>
                        </select>
                    </div>

                    <!-- Search Term -->
                    <div class="form-group" style="flex-basis: 100%;">
                        <label for="searchTerm">Search Term</label>
                        <input type="text" id="searchTerm" name="searchTerm" placeholder="Search by name or matric number...">
                    </div>

                    <!-- Media Filters -->
                    <div class="form-group" style="flex-basis: 100%;">
                        <label>Media Availability</label>
                        <div style="display:flex;gap:15px;flex-wrap:wrap;margin-top:5px;">
                            <label style="color:var(--text-secondary);font-size:0.9rem;">
                                <input type="checkbox" name="hasPhoto" value="1"> Has Photo
                            </label>
                            <label style="color:var(--text-secondary);font-size:0.9rem;">
                                <input type="checkbox" name="hasDoc" value="1"> Has Document
                            </label>
                            <label style="color:var(--text-secondary);font-size:0.9rem;">
                                <input type="checkbox" name="hasAudio" value="1"> Has Audio
                            </label>
                            <label style="color:var(--text-secondary);font-size:0.9rem;">
                                <input type="checkbox" name="hasVideo" value="1"> Has Video
                            </label>
                        </div>
                    </div>

                    <div class="filter-actions" style="flex-basis: 100%;">
                        <button type="submit" class="btn btn-primary">Apply Filters</button>
                        <button type="reset" class="btn-reset" onclick="document.getElementById('resultsGrid').innerHTML = '';">Reset</button>
                    </div>
                </form>

                <div class="hint">
                    <strong>Note:</strong> Results are filtered server-side via <code>abr_filter.php</code> using group, search term, and media availability filters.
                </div>
            </div>

            <!-- Results container -->
            <div id="resultsGrid" class="results-grid"></div>

            <!-- Back to Home -->
            <a href="../index.php" class="btn-back">← Back to Home</a>
        </div>
    </main>

    <!-- ==============================================================
    SCRIPTS
    ============================================================== -->
    <script src="../JS/script.js"></script>
</body>
</html>
